# skrl AMP-PPO agent configuration for Unitree G1 humanoid.
#
# Usage:
#   python scripts/skrl/train.py --task LeggedRLLab-Isaac-AMP-Flat-Unitree-G1-skrl-v0 \
#       --algorithm AMP --num_envs 4096 --headless --max_iterations 20000

seed: 42

# PPO rollout memory — stores policy transitions during collection.
memory:
  class: RandomMemory
  memory_size: -1  # auto-set to agent rollouts

models:
  separate: True

  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -0.6931471805599453  # ln(0.5)
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS

  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]
        activations: elu
    output: ONE

  discriminator:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [1024, 512]
        activations: elu
    output: ONE


# Reference motion memory — stores pre-loaded AMP features sampled by
# collect_reference_motions (→ env.collect_reference_motions).
motion_dataset:
  class: RandomMemory
  memory_size: 200000

# AMP replay buffer — stores policy AMP observations to prevent
# discriminator overfitting.
reply_buffer:
  class: RandomMemory
  memory_size: 1000000


agent:
  class: AMP

  rollouts: 24

  learning_epochs: 5
  mini_batches: 4

  discount_factor: 0.99
  gae_lambda: 0.95

  # [policy, value, discriminator]
  learning_rate: [1.0e-03, 1.0e-03, 1.0e-05]

  learning_rate_scheduler: "[KLAdaptiveLR, KLAdaptiveLR, None]"
  learning_rate_scheduler_kwargs:
    - {kl_threshold: 0.01}
    - {kl_threshold: 0.01}
    - {}

  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  entropy_loss_scale: 0.001

  value_loss_scale: 1.0

  discriminator_loss_scale: 5.0
  discriminator_batch_size: -1

  discriminator_logit_regularization_scale: 0.05
  discriminator_gradient_penalty_scale: 5.0
  discriminator_weight_decay_scale: 0.0001

  amp_batch_size: 512

  task_reward_scale: 0.7

  style_reward_scale: 0.3

  rewards_shaper_scale: null

  experiment:
    directory: unitree_g1_amp_flat_skrl
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: 2400  # 100 iterations * 24 rollouts


trainer:
  class: SequentialTrainer
  timesteps: 480000  # 20000 iterations * 24 rollouts
  environment_info: log
  close_environment_at_exit: False